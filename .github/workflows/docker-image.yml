name: CI build

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # Checkout Code
      # ---------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------------------
      # Set Image Tag
      # ---------------------------
      - name: Set Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------------------------
      # Backend Build (Spring Boot)
      # ---------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Backend
        working-directory: portfolio/portfolio
        run: mvn clean package -DskipTests

      - name: Maven Verify
        working-directory: portfolio/portfolio
        run: mvn verify -DskipTests

      # ---------------------------
      # Upload Backend Artifact
      # ---------------------------
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: portfolio/portfolio/target/*.jar

      # ---------------------------
      # Frontend Build (React)
      # ---------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        working-directory: frontend/portfolio
        run: npm install

      # - name: Run ESLint
      #   working-directory: frontend/portfolio
      #   run: |
      #     if npm run | grep -q lint; then
      #       npm run lint
      #     else
      #       echo "No lint script found, skipping"
      #     fi

      - name: Run npm audit
        working-directory: frontend/portfolio
        run: npm audit --audit-level=high || true

      - name: Build Frontend
        working-directory: frontend/portfolio
        run: npm run build

      # ---------------------------
      # Docker Login
      # ---------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------
      # Build Backend Docker Image
      # ---------------------------
      - name: Build Backend Docker Image
        working-directory: portfolio/portfolio
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ env.TAG }} .

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:${{ env.TAG }}

      # ---------------------------
      # Build Frontend Docker Image
      # ---------------------------
      - name: Build Frontend Docker Image
        working-directory: frontend/portfolio
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ env.TAG }} .

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:${{ env.TAG }}

      # ---------------------------
      # Security Scan Backend Image
      # ---------------------------
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend:latest

      # ---------------------------
      # Security Scan Frontend Image
      # ---------------------------
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-frontend:latest

      # ---------------------------
      # CI Summary
      # ---------------------------
      - name: CI Summary
        run: |
          echo "### CI Pipeline Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Built" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Built" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan Completed" >> $GITHUB_STEP_SUMMARY